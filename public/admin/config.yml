backend:
  name: git-gateway

# 로컬 개발 모드 — npx decap-server를 함께 실행해야 작동합니다
local_backend: true

# 이미지 업로드 위치
media_folder: public/image
public_folder: /image

# 글 목록
collections:
  - name: posts
    label: 글
    label_singular: 글 한 편
    folder: src/content/posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: 제목
        name: title
        widget: string
        hint: 글의 제목입니다.

      - label: 날짜
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        default: ""

      - label: 카테고리 (서가)
        name: category
        widget: select
        options:
          - { label: 에세이, value: 에세이 }
          - { label: 소설, value: 소설 }
          - { label: 인문교양, value: 인문교양 }
        hint: 헤더 메뉴에 표시되는 대분류입니다.

      - label: 태그 (책 제목)
        name: tags
        widget: list
        min: 1
        hint: "★ 첫 번째 태그가 메인 책장에서 책 제목이 됩니다. 예: 커피공부 / 커피 / 일상 순서로 입력하세요."

      - label: 썸네일 (책 표지)
        name: thumbnail
        widget: image
        required: false
        hint: "이 이미지가 메인 책장에서 책 표지로 사용됩니다. 같은 책의 글이 여러 편이면 가장 최신 글의 썸네일이 표지가 됩니다."

      - label: 한 줄 설명
        name: description
        widget: string
        required: false
        hint: 검색 결과와 SNS 공유 미리보기에 표시됩니다.

      - label: 본문
        name: body
        widget: markdown

      - label: 초안으로 저장
        name: draft
        widget: boolean
        default: false
        hint: "켜면 초안으로 저장됩니다 (사이트에 보이지 않음). 끄면 발행 상태입니다."
